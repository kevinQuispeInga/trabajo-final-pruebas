appId: com.example.flutter_catalogue
---
# Caso IA 1: Flujo de checkout completo en Fliptronics
- launchApp

# Iniciar sesión automáticamente
- tapOn: "Username"
- inputText: "estudiante@esan.edu.pe"
- pressKey: Enter
- tapOn: "Password"
- waitForAnimationToEnd
- inputText: "password123"
- pressKey: Enter
- tapOn: "Login"
- waitForAnimationToEnd

# Esperar pantalla de inicio
- assertVisible: "FlipTronics"

# Esperar a que carguen los productos de la base de datos (esperamos hasta 10 segundos)
- extendedWaitUntil:
    visible: ".*iPad Air.*"
    timeout: 10000

# 1. Entrar al detalle de iPad Air y agregarlo al carrito
- tapOn: ".*iPad Air.*"
- waitForAnimationToEnd
- tapOn:
    rightOf: "Rs.99999"
- waitForAnimationToEnd

# 2. Volver e ir al carrito
- pressKey: Back
- waitForAnimationToEnd
- tapOn: "1"
- waitForAnimationToEnd

# 3. Iniciar el checkout haciendo clic en Place Order
- assertVisible: "Place Order"
- tapOn: "Place Order"
