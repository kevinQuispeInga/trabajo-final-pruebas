appId: com.example.fliptronics
---
# Caso Base 2 (Integrante 2 - Anthony Llerena): Buscar producto en la tienda
- launchApp

# Esperar a que la pantalla de inicio cargue
- assertVisible: "Fliptronics"

# Tocar la barra de búsqueda
- tapOn: "Search products..."
- inputText: "iPhone 15"
- pressKey: Enter

# Esperar resultados de la búsqueda
- waitForAnimationToEnd
- assertVisible: "iPhone 15 Pro Max"

# Seleccionar el producto de los resultados
- tapOn: "iPhone 15 Pro Max"
- assertVisible: "Product Details"
